name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version and tag
        run: npm version ${{ inputs.version }} -m "v%s"
      - name: Push
        run: git push origin HEAD --follow-tags
      - name: Read new version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD^)
          else
            NOTES=$(git log --pretty=format:"- %s" HEAD^)
          fi
          gh release create "v${{ steps.pkg.outputs.version }}" --title "v${{ steps.pkg.outputs.version }}" --notes "$NOTES" --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
